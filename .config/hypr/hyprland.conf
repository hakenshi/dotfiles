#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#
# Monitor

source = $HOME/.config/hypr/conf/monitor.conf

# Autostart
source = $HOME/.config/hypr/conf/autostart.conf

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

source = $HOME/.cache/wal/colors-hyprland.conf

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun -show-icons
$browser = firefox-developer-edition
$editor = code
$player = spotify
# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

  accel_profile = flat
  sensitivity = -0.2
}
general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 3
    gaps_out = 3
    border_size = 0
    col.active_border = $color2
    col.inactive_border = $color0

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0

    blur {
        enabled = true
          size = 3
          passes = 2
        

      }

    drop_shadow = 0
    shadow_range = 4
    shadow_render_power = 1
    col.shadow = $color1
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.4, 1, 0.4, 1
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 8, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = false
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
source = $HOME/.config/hypr/conf/windowrules.conf

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER


# Keybinds

source = $HOME/.config/hypr/conf/keybinds.conf
